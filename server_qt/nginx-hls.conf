# VideoRecorder HLS 静态服务
# 用法：
#   1. 将下方 hls_output_dir 改为 config.ini 中的 hls_output_dir（末尾保留 /）
#   2. 将 listen 端口改为 config.ini 的 hls_port
#   3. sudo cp nginx-hls.conf /etc/nginx/conf.d/videorecorder-hls.conf
#   4. sudo nginx -t && sudo systemctl reload nginx

server {
    listen 8080;
    server_name _;

    # 与 config.ini [Server] hls_output_dir 一致，末尾必须有 /
    location /hls/ {
        alias /home/user/project/code/server_qt/hls/;

        types {
            application/vnd.apple.mpegurl m3u8;
            video/mp2t                    ts;
            image/jpeg                    jpg jpeg;
        }

        add_header Access-Control-Allow-Origin *;

        location ~ \.m3u8$ {
            add_header Cache-Control "no-cache";
            add_header Access-Control-Allow-Origin *;
        }
    }
}
